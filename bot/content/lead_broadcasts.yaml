    text: |
      парень уже был в теме
      делал 30–40к на товарке

      но когда начал нормально разбираться
      понял, сколько всего ещё не знает

      просто начал тестить
      копать глубже

      и вышел на 100–120к

      и тут даже не только про деньги

      он пишет про окружение
      людей, которые тоже двигаются
      с кем можно общаться, встречаться, расти

      и это сильно влияет

      потому что когда ты один —
      намного проще слиться

      если тебе это откликается
  - date: 2026-05-06
    video_file_id: BAACAgIAAxkBAAFIrsFp95wFCUuO_VGi-aXteX2zsC3_VgACPKcAAjaquEtNOxEqgTYcsDsE
    button_text: хочу так же
    text: |
      парню 17 лет
      пришёл вообще с нуля
      без заработка

      по сути — просто писал “в стол”
      без понимания, как это монетизировать

      и он тоже сомневался
      первые месяцы вообще без результата
      уже начинал думать, что не получится

      но не слился

      просто продолжил разбираться
      приходить на разборы
      делать то, что говорят

      и в итоге:
      стал сценаристом крупных ютуб-каналов
      с проектами на миллионы подписчиков

      и это не какая-то история “издалека”

      это человек, который был в той же точке
      что и многие сейчас

      разница только в том, что он не остановился

      если ты сейчас тоже думаешь
      “а получится ли у меня”
  - date: 2026-05-07
    video_file_id: BAACAgIAAxkBAAFIrs1p950R2xDLNatgKGFcYrxV6UA-HwACRKcAAjaquEtkVnGjdF-pfzsE
    button_text: хочу так же
    text: |
      Кирилл

      пришёл в 16 лет
      без заработка вообще
      без понимания, что делать

      просто хотел выйти на нормальный уровень и не зависеть от родителей

      в итоге за время работы:
      — больше 1 млн с блога (на ~360 подписчиков)
      — больше 1 млн на товарке

      и сейчас ему 18
      он уже сам себя обеспечивает
      снимает квартиру за 60к

      и это не повезло

      он просто взял инфу
      и начал её применять

      не сидел, не ждал
      а реально делал

      вот в этом вся разница

      потому что таких, как он, немного
      остальные просто смотрят и откладывают
