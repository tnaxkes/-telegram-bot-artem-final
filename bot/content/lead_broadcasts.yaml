    text: |
      парень пришёл вообще с нуля
      без опыта, без понимания, что делать

      работал в найме, как и многие

      в итоге за 2 недели сделал 40к
      и сейчас дальше двигается

      ничего сверхъестественного
      просто разобрался и начал делать

      в этом и разница

      кто-то годами ищет инфу
      а кто-то просто берёт и идёт по шагам

      если тебе это откликается
  - date: 2026-05-05
