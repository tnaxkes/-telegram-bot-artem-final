noon_message: |
  ты уже на финише, остался один шаг

  дальше всё максимально просто

  либо ты сейчас откладываешь
  думаешь, что разберёшься позже
  и через какое-то время возвращаешься в ту же точку
  с теми же мыслями и без результата

  либо принимаешь решение
  и начинаешь двигаться дальше

  без лишних раздумий

  другого варианта здесь нет

  ты уже посмотрел все три видео
  видел, как это работает
  примерно понимаешь, что нужно делать

  вопрос сейчас не в информации, вопрос в действии — сделаешь ты этот шаг или снова отложишь

  сейчас осталось 2 места
restart_message: |
  Ты уже получил доступ к обучению,
  в котором разобрано, как прийти к результату.

  Но пока ты этим не воспользовался —
  это просто “ещё один курс”, который лежит без дела.

  Самое ценное — не в доступе.
  А в том, что ты реально проходишь и применяешь.

  И начинается это с первого урока.

  Он короткий, понятный и даёт основу,
  без которой дальше просто не зайдёт.
evening_message: |
  смотри

  ты уже не первый раз что-то смотришь и изучаешь, скорее всего сохранял посты, смотрел других, пытался разобраться — а по факту ничего не поменялось

  потому что сама по себе информация не даёт результата

  можно дальше просто смотреть, откладывать, думать что начнёшь потом — и по итогу стоять на месте

  а можно по-другому: разобраться, что у тебя сейчас не так, и начать делать нормально, а не наугад

  анкета — это просто следующий шаг

  мы смотрим твою ситуацию, где ты сейчас и что мешает двигаться дальше — и после этого становится понятно, что делать
daily_posts:
  - button_text: хочу так же
    text: |
      парень пришёл вообще с нуля
      без опыта, без понимания, что делать

      работал в найме, как и многие

      в итоге за 2 недели сделал 40к
      и сейчас дальше двигается

      ничего сверхъестественного
      просто разобрался и начал делать

      в этом и разница

      кто-то годами ищет инфу
      а кто-то просто берёт и идёт по шагам

      если тебе это откликается
  - button_text: хочу так же
    video_file_id: BAACAgIAAxkBAAFIzbBp-VVPjadUOUP2vKaf4bJV5Ly88QACWaEAAgqVyUuibFdmCIfgrDsE
    text: |
      Артур пришёл уже с каким-то опытом
      делал 30–40к

      но по факту, как и у многих —
      не было полной картины

      начал глубже разбираться, тестить
      приходить на созвоны

      и в итоге вышел на 100–120к

      и это не какая-то магия

      он просто начал делать нормально
      с пониманием, а не наугад

      плюс он сам отметил важную вещь — окружение

      здесь люди, которые реально двигаются
      с кем можно общаться, расти, не сливаться

      это сильно влияет, поверь

      если ты сейчас тоже где-то топчешься
      или не понимаешь, как выйти на следующий уровень
  - button_text: хочу так же
    text: |
      парню 17 лет
      пришёл вообще с нуля
      без заработка

      по сути — просто писал "в стол"
      без понимания, как это монетизировать

      и он тоже сомневался
      первые месяцы вообще без результата
      уже начинал думать, что не получится

      но не слился

      просто продолжил разбираться
      приходить на разборы
      делать то, что говорят

      и в итоге:
      стал сценаристом крупных ютуб-каналов
      с проектами на миллионы подписчиков

      и это не какая-то история "издалека"

      это человек, который был в той же точке
      что и многие сейчас

      разница только в том, что он не остановился

      если ты сейчас тоже думаешь
      "а получится ли у меня"
  - button_text: хочу так же
    text: |
      Кирилл

      пришёл в 16 лет
      без заработка вообще
      без понимания, что делать

      просто хотел выйти на нормальный уровень и не зависеть от родителей

      в итоге за время работы:
      — больше 1 млн с блога (на ~360 подписчиков)
      — больше 1 млн на товарке

      и сейчас ему 18
      он уже сам себя обеспечивает
      снимает квартиру за 60к

      и это не повезло

      он просто взял инфу
      и начал её применять

      не сидел, не ждал
      а реально делал

      вот в этом вся разница

      потому что таких, как он, немного
      остальные просто смотрят и откладывают
