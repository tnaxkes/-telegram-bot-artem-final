noon_message: |
  ты уже на финише, остался один шаг

  дальше всё максимально просто

  либо ты сейчас откладываешь
  думаешь, что разберёшься позже
  и через какое-то время возвращаешься в ту же точку
  с теми же мыслями и без результата

  либо принимаешь решение
  и начинаешь двигаться дальше

  без лишних раздумий

  другого варианта здесь нет

  ты уже посмотрел все три видео
  видел, как это работает
  примерно понимаешь, что нужно делать

  вопрос сейчас не в информации, вопрос в действии — сделаешь ты этот шаг или снова отложишь

  сейчас осталось 2 места
restart_message: |
  Ты уже получил доступ к обучению,
  в котором разобрано, как прийти к результату.

  Но пока ты этим не воспользовался —
  это просто “ещё один курс”, который лежит без дела.

  Самое ценное — не в доступе.
  А в том, что ты реально проходишь и применяешь.

  И начинается это с первого урока.

  Он короткий, понятный и даёт основу,
  без которой дальше просто не зайдёт.
evening_message: |
  смотри

  ты уже не первый раз что-то смотришь и изучаешь, скорее всего сохранял посты, смотрел других, пытался разобраться — а по факту ничего не поменялось

  потому что сама по себе информация не даёт результата

  можно дальше просто смотреть, откладывать, думать что начнёшь потом — и по итогу стоять на месте

  а можно по-другому: разобраться, что у тебя сейчас не так, и начать делать нормально, а не наугад

  анкета — это просто следующий шаг

  мы смотрим твою ситуацию, где ты сейчас и что мешает двигаться дальше — и после этого становится понятно, что делать
